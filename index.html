<!DOCTYPE html><html><body>
<div id="s" style="background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;color:#fff;font-family:sans-serif">
    <div style="font-size:22px;font-weight:800;margin-bottom:8px">Signing in…</div>
    <div id="msg" style="color:#64748b;font-size:14px"></div>
  </div>
</div>
<script>
(async()=>{
  const msg=t=>document.getElementById('msg').textContent=t;
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code'),stateRaw=p.get('state')||'';
  if(!code||!window.opener){msg('Auth error: missing code or opener.');return;}
  let ver='',clientId='',redirectUri='',loginUrl='';
  try{
    const pad=stateRaw.replace(/-/g,'+').replace(/_/g,'/');
    const d=JSON.parse(new TextDecoder().decode(
      Uint8Array.from(atob(pad+('='.repeat((4-pad.length%4)%4))),c=>c.charCodeAt(0))
    ));
    ver=d.v||'';clientId=d.c||'';redirectUri=d.r||'';loginUrl=d.l||'https://login.salesforce.com';
  }catch(e){window.opener.postMessage({type:'sf_auth',error:'State decode failed: '+e.message},'*');window.close();return;}
  if(!ver||!clientId){window.opener.postMessage({type:'sf_auth',error:'Missing params in state.'},'*');window.close();return;}
  msg('Exchanging token…');
  try{
    const body=new URLSearchParams({grant_type:'authorization_code',client_id:clientId,redirect_uri:redirectUri,code,code_verifier:ver});
    const resp=await fetch(`${loginUrl}/services/oauth2/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
    if(!resp.ok){const t=await resp.text();window.opener.postMessage({type:'sf_auth',error:'Token failed: '+t.slice(0,200)},'*');window.close();return;}
    const tok=await resp.json();
    window.opener.postMessage({type:'sf_auth',token:tok.access_token,instance_url:tok.instance_url||'https://scorpion.lightning.force.com'},'*');
    msg('Done — closing…');
  }catch(e){window.opener.postMessage({type:'sf_auth',error:'Fetch error: '+e.message},'*');}
  setTimeout(()=>window.close(),400);
})();
</script></body></html>
