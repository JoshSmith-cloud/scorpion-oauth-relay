<!DOCTYPE html>
<html>
<body>
<div style="background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;color:#fff;font-family:-apple-system,sans-serif">
    <div style="font-size:28px;font-weight:800;margin-bottom:8px">Signing in&hellip;</div>
    <div id="msg" style="color:#64748b;font-size:14px"></div>
  </div>
</div>
<script>
const DASHBOARD='https://aibs.scorpion.co/hosted/hs-sales-dashboard/';
const hash=new URLSearchParams(window.location.hash.slice(1));
const token=hash.get('access_token');
const error=hash.get('error_description')||hash.get('error');
if(token){
  document.getElementById('msg').textContent='Redirecting back to dashboard\u2026';
  window.location.replace(DASHBOARD+'#sf_token='+encodeURIComponent(token));
}else{
  document.getElementById('msg').textContent='Error: '+(error||'No token. Check SF Connected App settings.');
}
</script>
</body>
</html>
