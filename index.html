<!DOCTYPE html><html><body>
<div style="background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;color:#fff;font-family:sans-serif">
    <div style="font-size:22px;font-weight:800;margin-bottom:8px">Signing in…</div>
    <div id="msg" style="color:#64748b;font-size:14px"></div>
  </div>
</div>
<script>
const msg=t=>document.getElementById('msg').textContent=t;
if(!window.opener){msg('No opener — close this window.');return;}
const hash=new URLSearchParams(window.location.hash.slice(1));
const token=hash.get('access_token');
const error=hash.get('error_description')||hash.get('error');
if(token){
  window.opener.postMessage({
    type:'sf_auth',
    token,
    instance_url:'https://scorpion.lightning.force.com'
  },'*');
  msg('Done — closing…');
  setTimeout(()=>window.close(),300);
}else{
  window.opener.postMessage({type:'sf_auth',error:error||'No token in response'},'*');
  window.close();
}
</script></body></html>
